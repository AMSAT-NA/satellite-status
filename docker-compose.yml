services:
  frontend:
    build:
      context: ./frontend/v1
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      SITE_URL: http://localhost:8080
      MYSQL_HOST: db
      MYSQL_USER: satellite
      MYSQL_PASSWORD: satellite
      MYSQL_DATABASE: satellite_status
    volumes:
      - ./frontend/v1:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.satellite-status-frontend.rule=Host(`status.amsat.org`)"
      - "traefik.http.routers.satellite-status-frontend.entrypoints=websecure"
      - "traefik.http.routers.satellite-status-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.satellite-status-frontend.priority=10"
      - "traefik.http.services.satellite-status-frontend.loadbalancer.server.port=80"

  api:
    build:
      context: ./api/v1
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    environment:
      SITE_URL: http://localhost:8081
      MYSQL_HOST: db
      MYSQL_USER: satellite
      MYSQL_PASSWORD: satellite
      MYSQL_DATABASE: satellite_status
    volumes:
      - ./api/v1:/var/www/html/api/v1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health.php"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.satellite-status-api.rule=Host(`status.amsat.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.satellite-status-api.entrypoints=websecure"
      - "traefik.http.routers.satellite-status-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.satellite-status-api.priority=20"
      - "traefik.http.services.satellite-status-api.loadbalancer.server.port=80"

  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: satellite_status
      MARIADB_USER: satellite
      MARIADB_PASSWORD: satellite
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:

networks:
  traefik-public:
    external: true
