# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/#customizing-settings
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
stages:
- build
- test
- deploy
- review
- dast
- staging
- canary
- production
- incremental rollout 10%
- incremental rollout 25%
- incremental rollout 50%
- incremental rollout 100%
- performance
- cleanup

# jobs for build stage
# Override default 'build' job
build:
  stage: build
  script: 
    - echo 'Create the package...'
    - "tar -C .. -czf ${CI_COMMIT_SHORT_SHA}_package.tgz ${CI_PROJECT_NAME} \
        --exclude ${CI_PROJECT_NAME}/.git \
        --exclude ${CI_PROJECT_NAME}/.gitignore \
        --exclude ${CI_PROJECT_NAME}/.gitlab-ci.yml \
        --exclude ${CI_PROJECT_NAME}/README.md"
  artifacts:
    paths:
      - ${CI_COMMIT_SHORT_SHA}_package.tgz
  
# jobs for test stage
# Default 'test' job
test:
  stage: test
  script:
    - echo 'this is the test job.'
    - ls -la

check-php-syntax:
  stage: test
  image: php:alpine  # Use latest version of php:alpine for testing.
  script:
    # install phplint to speed this up?
    - php -l config.php
    - php -l index.php
    - php -l submit.php
    - php -l api/v1/index.php
    - php -l api/v1/sat_info.php

check-php-version:
  stage: test
  image: php:alpine # Use latest version of php:alpine for testing.
  script:
    - php --version

phpunit:
  stage: test
  image: php:8.2-cli
  services:
    - name: mariadb:11
      alias: mariadb
  variables:
    # MariaDB service container
    MARIADB_ROOT_PASSWORD: testrootpw
    MARIADB_DATABASE:      satstatus
    MARIADB_USER:          satstatus
    MARIADB_PASSWORD:      satstatus
    # Picked up by tests/fixtures/config.test.php and tests/TestCase.php
    TEST_BASE_URL: "http://127.0.0.1:8000"
    TEST_DB_HOST:  mariadb
    TEST_DB_PORT:  "3306"
    TEST_DB_USER:  satstatus
    TEST_DB_PASS:  satstatus
    TEST_DB_NAME:  satstatus
  before_script:
    - apt-get update -yqq
    - apt-get install -yqq --no-install-recommends git unzip default-mysql-client
    - docker-php-ext-install mysqli
    # Wait for MariaDB to accept connections.
    - until mysql -h mariadb -usatstatus -psatstatus -e "SELECT 1" >/dev/null 2>&1; do sleep 1; done
    # Load the committed schema.
    - mysql -h mariadb -usatstatus -psatstatus satstatus < db/schema.sql
    # Composer + dev deps.
    - curl -sS https://getcomposer.org/installer | php -- --quiet
    - php composer.phar install --no-progress --no-interaction
    # Point the app at the test DB and start the web server in the background.
    - cp tests/fixtures/config.test.php config.php
    - php -S 127.0.0.1:8000 -t . >/tmp/php-server.log 2>&1 &
    # Wait for the web server to start responding.
    - until curl -sS -o /dev/null http://127.0.0.1:8000/; do sleep 1; done
  script:
    - vendor/bin/phpunit --colors=never
  artifacts:
    when: on_failure
    paths:
      - /tmp/php-server.log
    expire_in: 1 week

# Disable default 'container_scanning' job
# Can use this if we end up deploying as docker image vs. static code
container_scanning:
  stage: test
  when: manual

include:
  - template: Auto-DevOps.gitlab-ci.yml
